<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; height: 100%; }

    .overlay {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      background: rgba(26, 23, 20, 0.92);
      border-radius: 10px;
      border: 1px solid rgba(201, 191, 169, 0.2);
      -webkit-app-region: drag;
      user-select: none;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c4441a;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .timer {
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 18px;
      font-weight: 500;
      color: #f3ede1;
      letter-spacing: 0.03em;
      min-width: 60px;
    }

    .stop-btn {
      -webkit-app-region: no-drag;
      background: #c4441a;
      border: none;
      color: #f3ede1;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .stop-btn:hover { background: #a83815; }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="dot"></div>
    <div class="timer" id="timer">0:00</div>
    <button class="stop-btn" id="stop">Stop</button>
  </div>

  <script>
    const timerEl = document.getElementById('timer');
    const stopBtn = document.getElementById('stop');

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return m + ':' + pad(s);
    }

    let startedAt = null;
    let tickInterval = null;

    function startTick(ts) {
      startedAt = ts;
      tickInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        timerEl.textContent = formatTime(elapsed);
      }, 250);
    }

    window.overlayAPI.getStatus().then((status) => {
      if (status.isRecording && status.startedAt) {
        startTick(status.startedAt);
      }
    });

    window.overlayAPI.onStarted((startedAtTs) => {
      startTick(startedAtTs);
    });

    window.overlayAPI.onStopped(() => {
      clearInterval(tickInterval);
      timerEl.textContent = '0:00';
    });

    stopBtn.addEventListener('click', () => {
      window.overlayAPI.stop();
    });
  </script>
</body>
</html>
