name: Build Mnemori

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Patch electron-builder symlink issue (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: node scripts/patch-builder.js

      - name: Inject default API keys
        if: env.DEFAULT_OPENAI_KEY != ''
        env:
          DEFAULT_OPENAI_KEY: ${{ secrets.DEFAULT_OPENAI_KEY }}
          DEFAULT_ANTHROPIC_KEY: ${{ secrets.DEFAULT_ANTHROPIC_KEY }}
        run: |
          echo "{\"openai\":\"$DEFAULT_OPENAI_KEY\",\"anthropic\":\"$DEFAULT_ANTHROPIC_KEY\"}" > src/main/default-keys.json

      - name: Build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx vite build && npx electron-builder --publish never

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Mnemori-Windows-Installer
          path: dist/Mnemori Setup *.exe
          if-no-files-found: error

      - name: Upload Windows portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Mnemori-Windows-Portable
          path: dist/Mnemori *.exe
          if-no-files-found: warn

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Mnemori-macOS
          path: dist/*.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Mnemori v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/Mnemori-Windows-Installer/*
            artifacts/Mnemori-Windows-Portable/*
            artifacts/Mnemori-macOS/*
