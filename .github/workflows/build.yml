name: Build Mnemori

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Patch electron-builder symlink issue (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: node scripts/patch-builder.js

      - name: Inject default API keys
        if: env.DEFAULT_OPENAI_KEY != ''
        env:
          DEFAULT_OPENAI_KEY: ${{ secrets.DEFAULT_OPENAI_KEY }}
          DEFAULT_ANTHROPIC_KEY: ${{ secrets.DEFAULT_ANTHROPIC_KEY }}
        run: |
          echo "{\"openai\":\"$DEFAULT_OPENAI_KEY\",\"anthropic\":\"$DEFAULT_ANTHROPIC_KEY\"}" > src/main/default-keys.json

      - name: Build and publish (Windows)
        if: runner.os == 'Windows'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx vite build && npx electron-builder --publish always

      - name: Build and publish (macOS)
        if: runner.os == 'macOS'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx vite build && npx electron-builder --publish always --${{ matrix.arch }}

      - name: Upload Windows installer
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Mnemori-Windows-Installer
          path: dist/Mnemori Setup *.exe
          if-no-files-found: error

      - name: Upload Windows portable
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Mnemori-Windows-Portable
          path: dist/Mnemori *.exe
          if-no-files-found: warn

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Mnemori-macOS-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error
